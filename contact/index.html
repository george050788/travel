<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Jennis Chang Home Finance</title>
    <style>
        body { margin: 0; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8fafc; color: #0f172a; }
        .container { max-width: 900px; margin: 0 auto; padding: 32px 20px 48px; }
        .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 24px; box-shadow: 0 8px 20px rgba(15,23,42,.05); }
        h1 { margin: 0 0 8px; }
        p { line-height: 1.6; }
        .grid { display: grid; gap: 12px; margin-top: 16px; }
        .item { border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px; background: #f8fafc; }
        .label { font-size: .85rem; color: #475569; margin-bottom: 6px; }
        .value { font-weight: 600; }
        .cta { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; }
        a.btn { display: inline-block; text-decoration: none; padding: 10px 14px; border-radius: 10px; font-weight: 600; }
        .primary { background: #1d4ed8; color: #fff; }
        .secondary { background: #e2e8f0; color: #1e293b; }
    </style>
</head>

<body>
    <main class="container">
        <section class="card">
            <h1>Contact Jennis</h1>
            <p>Ready to get started? Reach out and we can discuss your goals, timeline, and best-fit loan options.</p>
            <div class="grid">
                <div class="item">
                    <div class="label">Phone</div>
                    <div class="value">(555) 123-4567</div>
                </div>
                <div class="item">
                    <div class="label">Email</div>
                    <div class="value">jennis@example.com</div>
                </div>
                <div class="item">
                    <div class="label">Service Area</div>
                    <div class="value">California & Remote Consultations</div>
                </div>
            </div>
            <div class="cta">
                <a class="btn primary" href="/mortgage-calculator/">Open Mortgage Calculator</a>
                <a class="btn secondary" href="/">Back to Home</a>
            </div>
        </section>
    </main>
</body>

</html>
